# =============================================================================
# AegisTrader -- Streamlit theme (Phase 1: neon-futuristic + security)
# -----------------------------------------------------------------------------
# WHERE THIS FILE GOES (important):
#   Rename it to  config.toml  and place it in a  .streamlit  folder INSIDE the
#   deployment folder:
#       4. Web App Deployment/.streamlit/config.toml
#   Then run Streamlit FROM that folder so it is picked up:
#       cd "...\4. Web App Deployment"
#       python -m streamlit run app.py
#   (On Streamlit Community Cloud, .streamlit/config.toml at the app root is
#   detected automatically.)
#
# Most options update live on rerun; font changes may need a server restart.
# =============================================================================

[theme]
base = "dark"

# Deep navy/near-black canvas with neon-cyan primary = futuristic but calm.
backgroundColor = "#0A0E17"           # main canvas
secondaryBackgroundColor = "#121A2A"  # cards, widgets, tables
primaryColor = "#22D3EE"              # neon cyan accent (buttons, focus, links)
textColor = "#E6EDF3"
linkColor = "#22D3EE"
borderColor = "#1E2A3C"
codeBackgroundColor = "#0F1626"
codeTextColor = "#00FFA3"             # neon green for code/numbers
baseRadius = "medium"

# Futuristic headings, clean body. Loaded from Google Fonts.
headingFont = "Orbitron:https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&display=swap"
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"

# Neon palette inherited by Altair/Vega charts that do not set explicit colors.
chartCategoricalColors = [
    "#00FFA3", "#22D3EE", "#FFB020", "#FF2E97",
    "#7C5CFF", "#4ADE80", "#F472B6", "#38BDF8",
]
